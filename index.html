
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thủy Sinh Hub | Bio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        @keyframes shimmer { 100% { transform: skewX(-12deg) translateX(200%); } }
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .shopee-btn { background: linear-gradient(135deg, #ee4d2d 0%, #ff7337 100%); }
        .swiper { padding: 0 24px 20px 24px !important; }
    </style>
</head>
<body class="max-w-md mx-auto">
    <header class="relative h-[35vh] flex items-center justify-center overflow-hidden bg-slate-900 rounded-b-[4rem] shadow-2xl mb-8">
        <img src="https://images.unsplash.com/photo-1524591431368-c26713c21b9b?w=1200" class="absolute inset-0 w-full h-full object-cover opacity-60">
        <div class="relative z-10 text-center">
            <div class="w-20 h-20 bg-white/10 backdrop-blur-xl rounded-[2rem] mx-auto mb-4 flex items-center justify-center text-4xl border border-white/20 shadow-2xl">🌿</div>
            <h1 class="text-3xl font-black text-white tracking-tighter uppercase leading-none">Thủy Sinh Hub</h1>
            <p class="text-emerald-400 text-[10px] font-bold mt-2 tracking-[0.3em] uppercase">The Art of Aquascaping</p>
        </div>
    </header>
    <main>
        <section class="mb-10 pt-4">
            <h2 class="text-xl font-black ml-6 mb-5 text-slate-800 flex items-center">
                <span class="w-2 h-8 bg-emerald-500 rounded-full mr-3 shadow-lg shadow-emerald-100"></span>
                🌿 Cây thủy sinh (không cần CO2)
            </h2>
            <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    
            <div class="swiper-slide bg-white rounded-[2.5rem] shadow-2xl shadow-blue-900/5 overflow-hidden p-3 flex flex-col border border-white">
                <div class="relative">
                    <img src="https://down-vn.img.susercontent.com/file/vn-11134207-7r98o-lz8uy8mkeij105.webp" class="w-full h-48 object-cover rounded-[2rem]">
                    <span class="absolute top-3 left-3 bg-gradient-to-r from-red-500 to-orange-500 text-white text-[9px] font-black px-3 py-1 rounded-full shadow-lg z-10">🔥 Hot</span>
                </div>
                <div class="px-2 py-4 flex-grow text-left">
                    <h3 class="text-[14px] font-bold text-slate-800 line-clamp-2 leading-tight">Thủy cúc</h3>
                    <div class="mt-3">
                        <span class="text-xl font-black text-emerald-600">20.000đ</span>
                    </div>
                </div>
                <a href="https://s.shopee.vn/AKU2vbO00U" target="_blank" class="shopee-btn w-full py-4 rounded-[1.5rem] text-white font-black text-center text-xs uppercase tracking-widest overflow-hidden relative">
                    <span class="relative z-10">MUA NGAY 🛒</span>
                    <div class="absolute inset-0 bg-white/20 -skew-x-12 translate-x-[-100%] animate-[shimmer_2s_infinite]"></div>
                </a>
            </div>
        
                </div>
            </div>
        </section>
    </main>
    <footer class="py-12 text-center opacity-20 text-[10px] font-black uppercase tracking-[0.4em]">© 2026 Thuy Sinh Hub</footer>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        new Swiper(".mySwiper", {
            slidesPerView: 1.25, spaceBetween: 20, grabCursor: true,
            freeMode: { enabled: true, sticky: true, momentumRatio: 0.5, momentumVelocityRatio: 0.5 },
            speed: 600, touchRatio: 1.2, resistanceRatio: 0.5
        });
    </script>
</body>
</html>
